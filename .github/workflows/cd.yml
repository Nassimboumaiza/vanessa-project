name: CD - Backend Deployment

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ${{ github.repository }}/backend

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Prepare Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      short_sha: ${{ steps.version.outputs.short_sha }}
      backend_image: ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}
      environment: ${{ steps.env.outputs.environment }}
      deploy_tag: ${{ steps.version.outputs.deploy_tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate version
        id: version
        run: |
          if [[ $GITHUB_REF == refs/tags/v* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
            DEPLOY_TAG=${GITHUB_REF#refs/tags/}
          else
            VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo "0.0.0-${GITHUB_SHA::7}")
            DEPLOY_TAG="sha-${GITHUB_SHA::7}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "short_sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
          echo "deploy_tag=$DEPLOY_TAG" >> $GITHUB_OUTPUT
          echo "📦 Version: $VERSION"
          echo "🔖 Deploy Tag: $DEPLOY_TAG"

      - name: Determine environment
        id: env
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "environment=${{ github.event.inputs.environment }}" >> $GITHUB_OUTPUT
          elif [[ $GITHUB_REF == refs/tags/v* ]]; then
            echo "environment=production" >> $GITHUB_OUTPUT
          else
            echo "environment=staging" >> $GITHUB_OUTPUT
          fi

  build-backend:
    name: Build Backend Image
    needs: prepare
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ needs.prepare.outputs.backend_image }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=,suffix=,format=short
            type=raw,value=${{ needs.prepare.outputs.deploy_tag }}
            type=raw,value=${{ needs.prepare.outputs.environment }},enable=${{ needs.prepare.outputs.environment != 'production' }}
            type=raw,value=latest,enable=${{ needs.prepare.outputs.environment == 'production' }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/php/Dockerfile
          target: production
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

  deploy-staging:
    name: Deploy to Staging
    needs: [prepare, build-backend]
    runs-on: ubuntu-latest
    if: needs.prepare.outputs.environment == 'staging'
    environment:
      name: staging
      url: https://staging.vanessaperfumes.com
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to staging server
        env:
          SSH_PRIVATE_KEY: ${{ secrets.STAGING_SSH_KEY }}
          SSH_HOST: ${{ secrets.STAGING_HOST }}
          SSH_USER: ${{ secrets.STAGING_USER }}
          DEPLOY_TAG: ${{ needs.prepare.outputs.deploy_tag }}
          REGISTRY: ${{ env.REGISTRY }}
        run: |
          echo "🚀 Deploying to staging environment..."
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          ssh -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key $SSH_USER@$SSH_HOST << EOF
            set -e
            cd /opt/vanessa-staging
            
            docker pull $REGISTRY/${{ env.BACKEND_IMAGE }}:$DEPLOY_TAG
            export BACKEND_IMAGE=$REGISTRY/${{ env.BACKEND_IMAGE }}:$DEPLOY_TAG
            
            docker compose -f docker-compose.staging.yml up -d --no-deps app
            docker compose -f docker-compose.staging.yml exec -T app php artisan migrate --force
            
            sleep 10
            curl -f http://localhost:80/health || exit 1
            
            echo "✅ Staging deployment successful"
          EOF

      - name: Run smoke tests
        run: |
          echo "🧪 Running smoke tests..."
          sleep 30
          curl -f https://api-staging.vanessaperfumes.com/api/health || exit 1

  deploy-production:
    name: Deploy to Production
    needs: [prepare, build-backend]
    runs-on: ubuntu-latest
    if: needs.prepare.outputs.environment == 'production'
    environment:
      name: production
      url: https://vanessaperfumes.com
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to production
        env:
          SSH_PRIVATE_KEY: ${{ secrets.PRODUCTION_SSH_KEY }}
          SSH_HOST: ${{ secrets.PRODUCTION_HOST }}
          SSH_USER: ${{ secrets.PRODUCTION_USER }}
          DEPLOY_TAG: ${{ needs.prepare.outputs.deploy_tag }}
          REGISTRY: ${{ env.REGISTRY }}
        run: |
          echo "🚀 Deploying to production..."
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          ssh -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key $SSH_USER@$SSH_HOST << EOF
            set -e
            cd /opt/vanessa-production
            
            docker pull $REGISTRY/${{ env.BACKEND_IMAGE }}:$DEPLOY_TAG
            export BACKEND_IMAGE=$REGISTRY/${{ env.BACKEND_IMAGE }}:$DEPLOY_TAG
            
            docker compose -f docker-compose.production.yml up -d app
            docker compose -f docker-compose.production.yml exec -T app php artisan migrate --force
            
            sleep 10
            curl -f http://localhost:80/health || exit 1
            
            echo "✅ Production deployment successful"
          EOF

      - name: Run smoke tests
        run: |
          echo "🧪 Running production smoke tests..."
          sleep 30
          curl -f https://api.vanessaperfumes.com/api/health || exit 1

  cleanup:
    name: Cleanup Old Images
    needs: [deploy-staging, deploy-production]
    runs-on: ubuntu-latest
    if: always() && (needs.deploy-staging.result == 'success' || needs.deploy-production.result == 'success')
    steps:
      - name: Delete old container images
        uses: actions/delete-package-versions@v5
        with:
          package-name: ${{ env.BACKEND_IMAGE }}
          package-type: 'container'
          min-versions-to-keep: 10
          delete-only-untagged-versions: true

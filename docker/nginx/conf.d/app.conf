# =============================================================================
# Laravel Application Server Block
# =============================================================================
# Production-ready server configuration for Vanessa Perfumes API
# Features: Rate limiting, CORS, security headers, custom error handling
# =============================================================================

server {
    listen 80;
    server_name _;  # Catch all
    root /var/www/html/public;
    index index.php index.html;

    # -----------------------------------------------------------------------------
    # Character Encoding
    # -----------------------------------------------------------------------------
    charset utf-8;

    # -----------------------------------------------------------------------------
    # Security: Hide Nginx version
    # -----------------------------------------------------------------------------
    server_tokens off;

    # -----------------------------------------------------------------------------
    # Connection Limits (per IP)
    # -----------------------------------------------------------------------------
    limit_conn conn_limit 50;  # Max 50 concurrent connections per IP

    # -----------------------------------------------------------------------------
    # Custom Error Pages
    # -----------------------------------------------------------------------------
    error_page 429 = @rate_limit_exceeded;
    error_page 502 503 504 = @backend_error;

    location @rate_limit_exceeded {
        default_type application/json;
        return 429 '{"success":false,"message":"Too many requests. Please slow down.","error":"RATE_LIMIT_EXCEEDED","retry_after":60}';
        add_header Content-Type application/json always;
        add_header Retry-After 60 always;
        add_header X-RateLimit-Limit 60 always;
        add_header X-RateLimit-Remaining 0 always;
        add_header X-RateLimit-Reset 60 always;
        add_header Access-Control-Allow-Origin $http_origin always;
        add_header Access-Control-Allow-Credentials true always;
    }

    location @backend_error {
        default_type application/json;
        return 503 '{"success":false,"message":"Service temporarily unavailable. Please try again.","error":"SERVICE_UNAVAILABLE"}';
        add_header Content-Type application/json always;
        add_header Retry-After 30 always;
    }

    # -----------------------------------------------------------------------------
    # Location: Health Check (for Docker healthcheck)
    # -----------------------------------------------------------------------------
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # -----------------------------------------------------------------------------
    # Location: Nginx Status (internal monitoring only)
    # -----------------------------------------------------------------------------
    location /nginx_status {
        stub_status on;
        access_log off;
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;
    }

    # -----------------------------------------------------------------------------
    # Location: Authentication Endpoints (strict rate limiting)
    # -----------------------------------------------------------------------------
    location ~ ^/api/v1/(login|register|forgot-password|reset-password|email/verify) {
        # Handle CORS preflight
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' $http_origin always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,X-CSRF-TOKEN' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Type' 'text/plain; charset=utf-8';
            add_header 'Content-Length' 0;
            return 204;
        }

        # CORS headers
        add_header 'Access-Control-Allow-Origin' $http_origin always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range,X-RateLimit-Limit,X-RateLimit-Remaining,X-RateLimit-Reset,Retry-After' always;

        # Rate limiting: 5 requests/minute, burst 2
        limit_req zone=auth_strict burst=2 nodelay;
        limit_req_status 429;

        # Rate limit headers
        add_header X-RateLimit-Limit 5 always;
        add_header X-RateLimit-Remaining $rate_limit_remaining always;
        add_header X-RateLimit-Reset 60 always;

        try_files $uri $uri/ /index.php?$query_string;
    }

    # -----------------------------------------------------------------------------
    # Location: Search Endpoints (moderate rate limiting)
    # -----------------------------------------------------------------------------
    location ~ ^/api/v1/(products/search|search) {
        # Handle CORS preflight
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' $http_origin always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,X-CSRF-TOKEN' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Type' 'text/plain; charset=utf-8';
            add_header 'Content-Length' 0;
            return 204;
        }

        # CORS headers
        add_header 'Access-Control-Allow-Origin' $http_origin always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range,X-RateLimit-Limit,X-RateLimit-Remaining,X-RateLimit-Reset,Retry-After' always;

        # Rate limiting: 20 requests/minute, burst 10
        limit_req zone=search burst=10 nodelay;
        limit_req_status 429;

        # Rate limit headers
        add_header X-RateLimit-Limit 20 always;
        add_header X-RateLimit-Remaining $rate_limit_remaining always;
        add_header X-RateLimit-Reset 60 always;

        try_files $uri $uri/ /index.php?$query_string;
    }

    # -----------------------------------------------------------------------------
    # Location: File Upload Endpoints (upload rate limiting)
    # -----------------------------------------------------------------------------
    location ~ ^/api/v1/admin/(products/[0-9]+/images|upload|images) {
        # Handle CORS preflight
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' $http_origin always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,X-CSRF-TOKEN' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Type' 'text/plain; charset=utf-8';
            add_header 'Content-Length' 0;
            return 204;
        }

        # CORS headers
        add_header 'Access-Control-Allow-Origin' $http_origin always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range,X-RateLimit-Limit,X-RateLimit-Remaining,X-RateLimit-Reset,Retry-After' always;

        # Rate limiting: 10 requests/minute, burst 5
        limit_req zone=upload burst=5 nodelay;
        limit_req_status 429;

        # Rate limit headers
        add_header X-RateLimit-Limit 10 always;
        add_header X-RateLimit-Remaining $rate_limit_remaining always;
        add_header X-RateLimit-Reset 60 always;

        try_files $uri $uri/ /index.php?$query_string;
    }

    # -----------------------------------------------------------------------------
    # Location: API Endpoints (general rate limiting with CORS)
    # -----------------------------------------------------------------------------
    location /api/ {
        # Handle CORS preflight
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' $http_origin always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,X-CSRF-TOKEN' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Type' 'text/plain; charset=utf-8';
            add_header 'Content-Length' 0;
            return 204;
        }

        # CORS headers for all responses
        add_header 'Access-Control-Allow-Origin' $http_origin always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range,X-RateLimit-Limit,X-RateLimit-Remaining,X-RateLimit-Reset,Retry-After' always;

        # Rate limiting: 60 requests/minute, burst 20
        limit_req zone=api_general burst=20 nodelay;
        limit_req_status 429;

        # Rate limit headers
        add_header X-RateLimit-Limit 60 always;
        add_header X-RateLimit-Remaining $rate_limit_remaining always;
        add_header X-RateLimit-Reset 60 always;

        try_files $uri $uri/ /index.php?$query_string;
    }

    # -----------------------------------------------------------------------------
    # Location: Frontend Assets (static files)
    # -----------------------------------------------------------------------------
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Frame-Options "SAMEORIGIN" always;
        access_log off;
        log_not_found off;
        try_files $uri =404;
    }

    # -----------------------------------------------------------------------------
    # Location: Laravel Storage (secure file serving)
    # -----------------------------------------------------------------------------
    location ^~ /storage/ {
        deny all;
        return 403;
    }

    # -----------------------------------------------------------------------------
    # Location: Deny access to sensitive files
    # -----------------------------------------------------------------------------
    location ~ /\.(?!well-known).* {
        deny all;
    }

    location ~ ^/(\.env|\.git|\.htaccess|\.htpasswd|composer\.(json|lock)|package\.json|Dockerfile|docker-compose) {
        deny all;
        return 404;
    }

    location ~* \.(log|sql|sh|ini)$ {
        deny all;
        return 404;
    }

    # -----------------------------------------------------------------------------
    # Location: PHP Files (FastCGI to PHP-FPM)
    # -----------------------------------------------------------------------------
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_param HTTP_PROXY "";
        fastcgi_buffering on;
        fastcgi_cache_valid 200 301 302 60m;
        fastcgi_read_timeout 300s;
    }

    # -----------------------------------------------------------------------------
    # Location: Default (Laravel routing)
    # -----------------------------------------------------------------------------
    location / {
        try_files $uri $uri/ /index.php?$query_string;
        gzip_static on;
    }

    # -----------------------------------------------------------------------------
    # Error Pages
    # -----------------------------------------------------------------------------
    error_page 404 /index.php;
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /var/www/html/public;
    }
}

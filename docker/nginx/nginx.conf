# =============================================================================
# Nginx Main Configuration
# =============================================================================
# Production-optimized Nginx configuration with security headers
# =============================================================================

user nginx;
worker_processes auto;
worker_rlimit_nofile 65535;

error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    # -----------------------------------------------------------------------------
    # Basic Settings
    # -----------------------------------------------------------------------------
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 20M;
    client_body_buffer_size 128k;
    client_header_buffer_size 1k;
    large_client_header_buffers 4 4k;

    # Buffers
    fastcgi_buffers 256 16k;
    fastcgi_buffer_size 32k;
    fastcgi_connect_timeout 300s;
    fastcgi_send_timeout 300s;
    fastcgi_read_timeout 300s;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/rss+xml
        font/truetype
        font/opentype
        application/vnd.ms-fontobject
        image/svg+xml;

    # -----------------------------------------------------------------------------
    # Security Headers
    # -----------------------------------------------------------------------------
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # -----------------------------------------------------------------------------
    # CORS Headers - Hardcoded allowed origins for reliability
    # -----------------------------------------------------------------------------
    map $http_origin $cors_origin {
        default "http://localhost:3000";
        "http://localhost:3000" "http://localhost:3000";
        "http://localhost:3001" "http://localhost:3001";
        "http://127.0.0.1:3000" "http://127.0.0.1:3000";
        "http://127.0.0.1:3001" "http://127.0.0.1:3001";
    }

    # -----------------------------------------------------------------------------
    # Rate Limiting Zones
    # -----------------------------------------------------------------------------
    # Zone definitions: 1MB stores ~16,000 IP addresses
    # 
    # API General: 60 requests/minute (1 req/sec average)
    # API Burst: Allows temporary spikes up to 20 requests
    # Auth: 5 requests/minute (strict for login/register/password reset)
    # Search: 20 requests/minute (resource-intensive queries)
    # Upload: 10 requests/minute (file uploads)
    # -----------------------------------------------------------------------------
    
    # General API rate limiting
    limit_req_zone $binary_remote_addr zone=api_general:10m rate=60r/m;
    
    # Authentication endpoints (stricter limits)
    limit_req_zone $binary_remote_addr zone=auth_strict:10m rate=5r/m;
    
    # Search endpoints (resource intensive)
    limit_req_zone $binary_remote_addr zone=search:10m rate=20r/m;
    
    # File upload endpoints
    limit_req_zone $binary_remote_addr zone=upload:10m rate=10r/m;
    
    # Connection limiting (concurrent connections per IP)
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;
    
    # Rate limit status variable for headers
    map $limit_req_status $rate_limit_remaining {
        ""         "60";
        "PASSED"   "59";
        "REJECTED" "0";
    }
    
    # Whitelist internal networks (no rate limiting)
    geo $rate_limit_exempt {
        default 0;
        127.0.0.1 1;
        10.0.0.0/8 1;
        172.16.0.0/12 1;
        192.168.0.0/16 1;
    }

    # -----------------------------------------------------------------------------
    # Logging Format
    # -----------------------------------------------------------------------------
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log main;

    # -----------------------------------------------------------------------------
    # Virtual Host Configs
    # -----------------------------------------------------------------------------
    include /etc/nginx/conf.d/*.conf;
}
